<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <header>
        <!-- place navbar here -->
    </header>
    <main>
        <div class="container py-4">
            <h1 class="mb-4">最新消息</h1>
            <div id="news"></div>
        </div>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>

    <script>
        $(function() {
            // 這裡可以放置 jQuery 相關的程式碼
            $.ajax({
                url: 'https://data.moenv.gov.tw/api/v2/ems_p_32?api_key=e75b1660-e564-4107-aad5-a8be1f905dd9&limit=1000&sort=ImportDate%20desc&format=JSON', // 替換為你的 JSON 文件路徑
                method: 'GET',
                dataType: 'json',
                success: function(data) {
                    // 在這裡處理從 JSON 獲取的數據
                    console.log(data);
                    /* 抓到的 newsitem 資料格式如下：
                        {
                            "organno": "YU",
                            "county": "高雄市",
                            "applydate": "2024-07-01T12:00:00",
                            "managename": "國家科學及技術委員會南部科學園區管理局(原科技部南部科學園區管理局)",
                            "organname": "南科-橋頭園區",
                            "statusname": "地方政府開發",
                            "refstyle": "本期不需申報",
                            "modify_time": ""
                        }
                    */
                    // 例如，可以將數據動態添加到頁面上
                    $str = '';
                    data.forEach(function(newsItem) {
                        $str += `<p>
                                   編號：${newsItem.organno}<br>
                                   城市：${newsItem.county}<br>
                                   日期：${newsItem.applydate}<br>
                                   主題：${newsItem.managename}<br>
                                 </p>`;
                    });
                    $('#news').append($str);
                },
                error: function(xhr, status, error) {
                    console.error('Error fetching news:', error);
                }
            })
        });
    </script>
</body>

</html>
