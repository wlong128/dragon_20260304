    <!-- 引入外部檔案 nav.html 的 JavaScript -->
    <script>
        includeHTML();
        function includeHTML() {
            var z, i, elmnt, file, xhttp;
            /* Loop through a collection of all HTML elements: */
            z = document.getElementsByTagName("*");
            for (i = 0; i < z.length; i++) {
                elmnt = z[i];
                /*search for elements with a certain atrribute:*/
                file = elmnt.getAttribute("w3-include-html");
                if (file) {
                    /* Make an HTTP request using the attribute value as the file name: */
                    xhttp = new XMLHttpRequest();
                    xhttp.onreadystatechange = function () {
                        if (this.readyState == 4) {
                            if (this.status == 200) { elmnt.innerHTML = this.responseText; }
                            if (this.status == 404) { elmnt.innerHTML = "Page not found."; }
                            /* Remove the attribute, and call this function once more: */
                            elmnt.removeAttribute("w3-include-html");
                            includeHTML();
                        }
                    }
                    xhttp.open("GET", file, true);
                    xhttp.send();
                    /* Exit the function: */
                    return;
                }
            }
        }
    </script>
    <script>
        function addCart(productId) {
            // alert("已加入購物車，產品ID: " + productId);
            // 這裡可以加入實際的加入購物車邏輯，例如發送 AJAX 請求到後端
        }
        $(function () {
            // 這裡可以加入頁面載入後的初始化邏輯，例如載入產品列表
            var apiUrl = "api/product_type.php";
            var apiUrl2 = "api/product.php";
            // 取得 url 參數 p 的值，並將其附加到 apiUrl 中
            var urlParams = new URLSearchParams(window.location.search);
            var t = urlParams.get('t');
            if (t) {
                apiUrl += "?t=" + t;
                apiUrl2 += "?t=" + t;
            }
            $.get(apiUrl, function (data) {
                // console.log(data);
                // 這裡可以根據返回的資料動態生成產品列表
                if(data.type != ""){
                    $('.breadcrumb').append(`<li class="breadcrumb-item active" aria-current="page">${data.type}</li>`);
                    $('#store').removeClass('active');
                    $('#store').html(`<a href="store.html">線上購物</a>`);
                }
                
                var str = "";
                data.data.forEach(function (product) {
                    str += `<a class="btn btn-outline-dark" href="store.html?t=${product.id}">${product.type}</a>`;
                });
                $('#product_type').html(str);
            }, "json");

            console.log(apiUrl2);
                
            $.get(apiUrl2, function (data2) {
                console.log(data2);
                // 這裡可以根據返回的資料動態生成產品列表
                var str = "";
                data2.data.forEach(function (product) {
                    str += `
                        <div class="col-md-3">
                            <div class="card">
                                <a href="product.html?p=${product.id}">
                                <img src="upload/${product.img}" class="card-img-top" alt="...">
                                </a>

                                    <h5 class="card-title">${product.name}</h5>
                                    <p class="card-text">${product.price}</p>
                                    </a>
                                    <a href="#" class="btn btn-primary" onclick="addCart(${product.id})">加入購物車</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
                $('#product_list').html(str);
            }, "json");
        });
