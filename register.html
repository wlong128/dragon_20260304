<!doctype html>
<html lang="en">

<head>
    <title>會員註冊</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <style>
        .news-item a {
            color: black;
            text-decoration: none;
        }
    </style>
    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="#">烏龍院</a>
                <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapsibleNavId" aria-controls="collapsibleNavId" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="collapsibleNavId">
                    <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html" aria-current="page">首頁</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="about.html">關於我們</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="news.html">最新消息</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="store.html">線上購物</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="dropdownId" data-bs-toggle="dropdown"
                                aria-haspopup="true" aria-expanded="false">來賓</a>
                            <div class="dropdown-menu" aria-labelledby="dropdownId">
                                <a class="dropdown-item" href="login.html">登入</a>
                                <a class="dropdown-item" href="logout.html">登出</a>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="container py-5">
            <h1 class="mb-4">會員註冊</h1>
            <!-- 麵包屑 -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">首頁</a></li>
                    <li class="breadcrumb-item active" aria-current="page">會員註冊</li>
                </ol>
            </nav>
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <!-- 會員註冊表單 -->
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">帳號</label>
                            <input type="text" class="form-control" id="username" placeholder="請輸入個人帳號">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">電子郵件</label>
                            <input type="email" class="form-control" id="email" placeholder="請輸入電子郵件">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密碼</label>
                            <input type="password" class="form-control" id="password" placeholder="請輸入密碼">
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">確認密碼</label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="請再次輸入密碼">
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label">真實姓名</label>
                            <input type="text" class="form-control" id="name" placeholder="請輸入真實姓名">
                        </div>
                        <button type="submit" class="btn btn-primary">註冊</button>
                    </form>
                    <!-- /會員註冊表單 -->
                </div>
            </div>
        </div>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script>
        $(function () {
            $('#registerForm').submit(function (e) {
                e.preventDefault(); // 阻止表單的默認提交行為

                // 判斷密碼和確認密碼是否一致
                var password = $('#password').val();
                var confirmPassword = $('#confirmPassword').val();
                if (password !== confirmPassword) {
                    alert('密碼和確認密碼不一致，請重新輸入。');
                    return; // 結束函數執行
                }

                // 獲取表單數據
                var formData = {
                    username: $('#username').val(),
                    password: $('#password').val(),
                    email: $('#email').val(),
                    name: $('#name').val()
                };

                // 發送 AJAX 請求到註冊 API
                $.ajax({
                    url: 'api/register.php', // 替換為你的註冊 API 路徑
                    method: 'POST',
                    data: formData,
                    dataType: 'json',
                    success: function (response) {
                        if (response.success) {
                            alert(response.message); // 註冊成功提示
                            window.location.href = 'login.html'; // 跳轉到登入頁面
                        } else {
                            alert(response.message); // 註冊失敗提示
                        }
                    },
                    error: function (xhr, status, error) {
                        console.error('Error:', error);
                        alert('註冊過程中發生錯誤，請稍後再試。');
                    }
                });
            });
        });
    </script>
</body>

</html>
