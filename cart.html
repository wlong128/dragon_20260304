<!doctype html>
<html lang="en">

<head>
    <title>購物車</title>

    <meta charset="utf-8" />

<body>
    <header>
        <!-- 引入外部檔案 nav.html -->
        <div w3-include-html="nav.html"></div>
    </header>
    <main>
        <div class="container py-5">
            <h1 class="mb-4">購物車</h1>
            <!-- 麵包屑 -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">首頁</a></li>
                    <li class="breadcrumb-item" aria-current="page"><a href="store.html">線上購物</a></li>
                    <li class="breadcrumb-item active" aria-current="page">購物車</li>
                </ol>
            </nav>
            <!-- 購物車列表 -->
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th scope="col">選取</th>
                        <th scope="col">產品名稱</th>
                        <th scope="col">數量</th>
                        <th scope="col">價格</th>
                        <th scope="col">小計</th>
                        <th scope="col">操作</th>
                    </tr>
                </thead>
                <tbody id="cart-items">
                    <!-- 購物車項目將在這裡顯示 -->
                </tbody>
            </table>
            <button class="btn btn-primary" onClick="buy()">購買</button>
            <!-- /購物車列表 -->
        </div>
    </main>
        
    <!-- 引入外部檔案 footer.html -->
    <div w3-include-html="footer.html"></div>
    
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script>
        $(function () {
            // 這裡可以放置 jQuery 相關的程式碼
            $.ajax({
                url: 'api/cart.php', // 替換為你的 JSON 文件路徑
                method: 'POST',
                data: {
                    token: localStorage.getItem('token')
                },
                success: function (response) {
                    console.log('Cart items:', response);
                    response = JSON.parse(response);
                    if (response.success) {
                        const cartItems = response.data;
                        let str = '';
                        cartItems.forEach(item => {
                            str += `
                                <tr>
                                    <td><input type="checkbox" class="form-check-input" value="${item.id}"></td>
                                    <td>${item.product_name}</td>
                                    <td><input type="number" class="form-control" value="${item.count}" min="1" id="count-${item.id}" data-count="${item.count}" style="width: 55px;"></td>
                                    <td>${item.product_price}</td>
                                    <td>${item.total}</td>
                                    <td>
                                        <button class="btn btn-success btn-sm" id="save-${item.id}" onClick="saveCartItem(${item.id})" disabled>儲存</button>
                                        <button class="btn btn-danger btn-sm" onClick="if(confirm('確定要移除這項商品嗎？')) { deleteCartItem(${item.id}); }">移除</button>
                                    </td>
                                </tr>
                            `;                        });
                        $('#cart-items').html(str);
                    } else {
                        console.error('Failed to fetch cart items:', response.message);
                    }
                },
                error: function (xhr, status, error) {
                    console.error('Error fetching news:', error);
                }
            })
            // 監聽數量輸入框的變化，啟用或禁用儲存按鈕
            $(document).on('input', 'input[type="number"]', function () {
                const cartId = $(this).attr('id').split('-')[1];
                const originalCount = $(this).data('count');
                const currentCount = $(this).val();
                $(`#save-${cartId}`).prop('disabled', currentCount == originalCount);
            });
        });
        function deleteCartItem(cartId) {
            $.ajax({
                url: 'api/cart-del.php',
                method: 'POST',
                data: {
                    token: localStorage.getItem('token'),
                    cart_id: cartId
                },
                success: function (response) {
                    console.log('Delete response:', response);
                    response = JSON.parse(response);
                    if (response.success) {
                        // alert(response.message);
                        location.reload(); // 刪除後重新載入頁面以更新購物車列表
                    } else {
                        console.error('Failed to delete cart item:', response.message);
                    }
                },
                error: function (xhr, status, error) {
                    console.error('Error deleting cart item:', error);
                }
            });
        }
        function saveCartItem(cartId) {
            // 這裡可以放置儲存購物車項目的程式碼
            // alert('儲存功能尚未實作');
            const count = $(`#count-${cartId}`).val();
            $.ajax({
                url: 'api/cart-update.php',
                method: 'POST',
                data: {
                    token: localStorage.getItem('token'),
                    cart_id: cartId,
                    count: count
                },
                success: function (response) {
                    console.log('Update response:', response);
                    response = JSON.parse(response);
                    if (response.success) {
                        alert(response.message);
                        // location.reload(); // 更新後重新載入頁面以更新購物車列表
                    } else {
                        console.error('Failed to update cart item:', response.message);
                    }
                },
                error: function (xhr, status, error) {
                    console.error('Error updating cart item:', error);
                }
            });
        }
        function buy() {
            const selectedItems = [];
            $('#cart-items input[type="checkbox"]:checked').each(function () {
                selectedItems.push($(this).val());
            });
            if (selectedItems.length === 0) {
                alert('請至少選擇一項商品進行購買');
                return;
            }else {
                alert(`確定要購買選取的 ${selectedItems.length} (${selectedItems.join(', ')}) 項商品嗎？`);
            }
            // 這裡可以放置購買功能的程式碼
            // alert('購買功能尚未實作');
            // $.ajax({
            //     url: 'api/cart-buy.php',
            //     method: 'POST',
            //     data: {
            //         token: localStorage.getItem('token'),
            //         cart_ids: selectedItems.join(',')
            //     },
            //     success: function (response) {
            //         console.log('Buy response:', response);
            //         response = JSON.parse(response);
            //         if (response.success) {
            //             alert(response.message);
            //             location.reload(); // 購買後重新載入頁面以更新購物車列表
            //         } else {
            //             console.error('Failed to buy items:', response.message);
            //         }
            //     },
            //     error: function (xhr, status, error) {
            //         console.error('Error buying items:', error);
            //     }
            // });
        }
    </script>
    <script>
        includeHTML();
        function includeHTML() {
            var z, i, elmnt, file, xhttp;
            /* Loop through a collection of all HTML elements: */
            z = document.getElementsByTagName("*");
            for (i = 0; i < z.length; i++) {
                elmnt = z[i];
                /*search for elements with a certain atrribute:*/
                file = elmnt.getAttribute("w3-include-html");
                if (file) {
                    /* Make an HTTP request using the attribute value as the file name: */
                    xhttp = new XMLHttpRequest();
                    xhttp.onreadystatechange = function () {
                        if (this.readyState == 4) {
                            if (this.status == 200) { elmnt.innerHTML = this.responseText; }
                            if (this.status == 404) { elmnt.innerHTML = "Page not found."; }
                            /* Remove the attribute, and call this function once more: */
                            elmnt.removeAttribute("w3-include-html");
                            includeHTML();
                        }
                    }
                    xhttp.open("GET", file, true);
                    xhttp.send();
                    /* Exit the function: */
                    return;
                }
            }
        }
    </script>
</body>

</html>
