    <style>
        .news-item a {
            color: black;
            text-decoration: none;
        }
    </style>
    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="#">烏龍院</a>
                <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapsibleNavId" aria-controls="collapsibleNavId" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="collapsibleNavId">
                    <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html" aria-current="page">首頁</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="about.html">關於我們</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="news.html">最新消息</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="store.html">線上購物</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="dropdownId" data-bs-toggle="dropdown"
                                aria-haspopup="true" aria-expanded="false">來賓</a>
                            <div class="dropdown-menu" aria-labelledby="dropdownId">
                                <a class="dropdown-item" href="login.html">登入</a>
                                <a class="dropdown-item" href="logout.html">登出</a>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="container py-5">
            <h1 class="mb-4">會員登入</h1>
            <!-- 麵包屑 -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">首頁</a></li>
                    <li class="breadcrumb-item"><a href="register.html">會員註冊</a></li>
                    <li class="breadcrumb-item active" aria-current="page">會員登入</li>
                </ol>
            </nav>
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <!-- 會員登入表單 -->
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">帳號</label>
                            <input type="text" class="form-control" id="username" placeholder="請輸入個人帳號">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密碼</label>
                            <input type="password" class="form-control" id="password" placeholder="請輸入密碼">
                        </div>
                        <div class="mb-3">
                            還沒有帳號？<a class="btn btn-link" href="register.html">立即註冊</a>
                        </div>
                        <button type="submit" class="btn btn-primary">登入</button>
                    </form>
                    <!-- /會員登入表單 -->
                </div>
            </div>
        </div>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script>
        $(function () {
            $('#loginForm').submit(function (e) {
                e.preventDefault(); // 阻止表單的默認提交行為

                // 獲取表單數據
                var formData = {
                    username: $('#username').val(),
                    password: $('#password').val()
                };

                // 發送 AJAX 請求到 api/login.php
                $.ajax({
                    url: 'api/login.php',
                    type: 'POST',
                    data: formData,
                    dataType: 'json',
                    success: function (response) {
                        if (response.success) {
                            alert(response.message); // 登入成功，顯示成功訊息
                            window.location.href = 'index.html'; // 重定向到首頁
                        } else {
                            alert(response.message); // 登入失敗，顯示錯誤訊息
                        }
                    },
                    error: function () {
                        alert('發生錯誤，請稍後再試。'); // AJAX 請求失敗，顯示錯誤訊息
                    }
                });
            });
        });
    </script>
</body>

</html>
